blueprint:
  name: Calendar Scheduler - Master Automation
  description: >-
    Every minute, checks the chosen Local Calendar for events starting or
    ending in the past minute and parses their description as JSON
    ({"entities":[{"entity_id":"...","service":"...","params":{...},"revert":true}]}).
    Fires each listed service call when an event starts. When an event ends,
    fires each entity's reverse action (the opposite turn_on/turn_off for
    simple toggle domains, or a fixed domain-appropriate "off" service for
    cover/climate/media_player), unless that entity's "revert" field is
    false (a one-shot trigger with no reverse action) or its domain has no
    off-state (e.g. scene). "revert" defaults to true when omitted.
    Polls once a minute via calendar.get_events rather than using the
    built-in calendar trigger, which only rescans its schedule every 15
    minutes and can silently miss events created shortly before they start.
  domain: automation
  input:
    calendar_entity:
      name: Calendar
      description: The Local Calendar entity that the Calendar Scheduler card writes events to.
      default: calendar.calendar
      selector:
        entity:
          domain: calendar

mode: single
triggers:
  - trigger: time_pattern
    minutes: "*"
actions:
  - variables:
      calendar_entity: !input calendar_entity
      window_start: "{{ (trigger.now - timedelta(minutes=1)).isoformat() }}"
      window_end: "{{ trigger.now.isoformat() }}"
      off_overrides:
        cover: cover.close_cover
      no_off_domains:
        - scene
  - action: calendar.get_events
    target:
      entity_id: !input calendar_entity
    data:
      start_date_time: "{{ window_start }}"
      end_date_time: "{{ window_end }}"
    response_variable: cal_events
  - repeat:
      for_each: "{{ cal_events[calendar_entity].events }}"
      sequence:
        - choose:
            - conditions:
                - condition: template
                  value_template: >-
                    {{ repeat.item.description is defined and
                       repeat.item.description not in [none, ''] and
                       (repeat.item.description | trim).startswith('{') }}
              sequence:
                - variables:
                    payload: "{{ repeat.item.description | from_json }}"
                    is_start: >-
                      {{ as_datetime(repeat.item.start) >= as_datetime(window_start) and
                         as_datetime(repeat.item.start) < as_datetime(window_end) }}
                    is_end: >-
                      {{ as_datetime(repeat.item.end) >= as_datetime(window_start) and
                         as_datetime(repeat.item.end) < as_datetime(window_end) }}
                - repeat:
                    for_each: "{{ payload.entities }}"
                    sequence:
                      - variables:
                          domain: "{{ repeat.item.entity_id.split('.')[0] }}"
                          should_revert: >-
                            {{ repeat.item.revert if repeat.item.revert is defined else true }}
                      - choose:
                          - conditions:
                              - "{{ is_start }}"
                            sequence:
                              - action: "{{ repeat.item.service }}"
                                target:
                                  entity_id: "{{ repeat.item.entity_id }}"
                                data: "{{ repeat.item.params | default({}) }}"
                          - conditions:
                              - "{{ is_end and should_revert and domain not in no_off_domains }}"
                            sequence:
                              - action: >-
                                  {{ off_overrides[domain] if domain in off_overrides
                                     else (domain ~ '.turn_off') if repeat.item.service.endswith('.turn_on')
                                     else (domain ~ '.turn_on') if repeat.item.service.endswith('.turn_off')
                                     else (domain ~ '.turn_off') }}
                                target:
                                  entity_id: "{{ repeat.item.entity_id }}"
