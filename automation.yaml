alias: Calendar Scheduler - Master Automation
description: >-
  Reads calendar.calendar event descriptions as JSON
  ({"entities":[{"entity_id":"...","service":"...","params":{...}}]}) and
  fires each listed service call on event start. On event end, calls each
  entity's domain-appropriate "off" service, skipping domains with no
  off-state (e.g. scene).
mode: parallel
trigger:
  - trigger: calendar
    entity_id: calendar.calendar
    event: start
    id: start
  - trigger: calendar
    entity_id: calendar.calendar
    event: end
    id: end
condition:
  - condition: template
    value_template: >-
      {{ trigger.calendar_event.description is defined and
         trigger.calendar_event.description not in [none, ''] }}
action:
  - variables:
      payload: "{{ trigger.calendar_event.description | from_json }}"
      off_overrides:
        cover: cover.close_cover
      no_off_domains:
        - scene
  - repeat:
      for_each: "{{ payload.entities }}"
      sequence:
        - variables:
            domain: "{{ repeat.item.entity_id.split('.')[0] }}"
        - choose:
            - conditions:
                - condition: trigger
                  id: start
              sequence:
                - action: "{{ repeat.item.service }}"
                  target:
                    entity_id: "{{ repeat.item.entity_id }}"
                  data: "{{ repeat.item.params | default({}) }}"
            - conditions:
                - condition: trigger
                  id: end
                - condition: template
                  value_template: "{{ domain not in no_off_domains }}"
              sequence:
                - action: >-
                    {{ off_overrides.get(domain, domain ~ '.turn_off') }}
                  target:
                    entity_id: "{{ repeat.item.entity_id }}"
